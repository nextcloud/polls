name: "CodeQL"

on:
  push:
    branches: [ "main", "master*", "next", "stable-*" ]
  pull_request:
    branches: [ "main", "master*", "next" ]
  schedule:
    - cron: '26 15 * * 4'

jobs:
  analyze:
    runs-on: ubuntu-latest

    name: Analyze

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: Initialize CodeQL
      uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e #4.36.2
      with:
        languages: ${{ matrix.language }}
    - name: Autobuild
      uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e #4.36.2
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e #4.36.2
