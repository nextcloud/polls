name: "CodeQL"

on:
  push:
    branches: [ "main", "master*", "next", "stable-*" ]
  pull_request:
    branches: [ "main", "master*", "next" ]
  schedule:
    - cron: '26 15 * * 4'

jobs:
  analyze:
    runs-on: ubuntu-latest

    name: Analyze

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Initialize CodeQL
      uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e #4.36.2
      with:
        languages: ${{ matrix.language }}
    - name: Autobuild
      uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 #4.37.0
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e #4.36.2
